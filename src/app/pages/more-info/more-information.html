<div class="container">

  <div class="header">
    <button class="back-btn" routerLink="/dashboard">
      ← Back
    </button>

    <h2>User Profile</h2>
  </div>

  <div class="card">

    <h3>Personal Information</h3>

    <div class="form-group">
      <label>I am</label>
      <select>
        <option>Student</option>
        <option>Teacher</option>
      </select>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email">
    </div>
   <div class="form-group">
  <label>Phone Number</label>

  <div class="phone-box">

    <select>
      <option>+91</option>
      <option>+1</option>
      <option>+44</option>
      <option>+61</option>
    </select>

    <input
      type="text"
      placeholder="Enter phone number">

  </div>
</div>
   

    <h3>Professional Information</h3>

    <div class="form-group">
      <label>Skills</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Sub Skills</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Qualification</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Subject</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>Hourly Rate / Budget</label>
      <input type="number">
    </div>

    <h3>Address</h3>

    <div class="form-group">
      <label>Address Line 1</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Address Line 2</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Country</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>State</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>City</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>ZIP Code</label>
      <input type="text">
    </div>

    <h3>Notification Preferences</h3>

    <label>
      <input type="checkbox">
      Email Notifications
    </label>

    <br><br>

    <label>
      <input type="checkbox">
      SMS Notifications
    </label>

    <div class="buttons">
      <button class="cancel-btn">Cancel</button>
      <button class="save-btn">Save Changes</button>
    </div>

  </div>

</div>
