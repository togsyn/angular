<div class="container">
  <div class="card">

    <h2>Complete Profile</h2>
    <p>Step 2 of 2</p>

    <input placeholder="Phone" [(ngModel)]="phone">

    <select [(ngModel)]="gender">
      <option value="">Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <input type="date" [(ngModel)]="dob">

    <input placeholder="Role (Teacher/Student)" [(ngModel)]="role">

    <input placeholder="Country" [(ngModel)]="country">
    <input placeholder="State" [(ngModel)]="state">
    <input placeholder="City" [(ngModel)]="city">

    <button (click)="submit()">Finish</button>

  </div>
</div>
