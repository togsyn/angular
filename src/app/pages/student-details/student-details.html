<div class="details-page">

  <h2>Student Contact Details</h2>

  <div class="details-card">

    <h3>{{student.name}}</h3>

    <p>
      <strong>Gender:</strong>
      {{student.gender}}
    </p>

    <p>
      <strong>Location:</strong>
      {{student.country}},
      {{student.city}}
    </p>

    <p>
      <strong>Email:</strong>
      {{student.email}}
    </p>

    <p>
      <strong>Phone:</strong>
      {{student.phone}}
    </p>

    <p>
      <strong>Skills:</strong>
      {{student.skills}}
    </p>

  </div>

</div>
