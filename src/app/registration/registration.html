<div class="container">

    <h2>Registration Form</h2>

    <form [formGroup]="registerForm"
          (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                formControlName="username">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                formControlName="email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                formControlName="password">
        </div>

        <button type="submit">
            Register
        </button>

    </form>

</div>
